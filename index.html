<!DOCTYPE html>
<!-- lang="en-GB" forces 24h time + dd/mm/yyyy date display. Maritime
     convention onboard is always 24h. -->
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#fafbfd" />
    <title>Wake</title>
    <!-- Self-hosted fonts (latin subsets, 85 kB total): no third-party render-blocking
         request, works offline / from a network share, and stable paths allow preload.
         Source: @fontsource-variable/manrope + @fontsource/ibm-plex-mono (devDeps). -->
    <link rel="preload" href="./fonts/manrope-latin-wght-normal.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="./fonts/ibm-plex-mono-latin-400-normal.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="./fonts/ibm-plex-mono-latin-700-normal.woff2" as="font" type="font/woff2" crossorigin />
    <style>
      @font-face {
        font-family: 'Manrope';
        font-style: normal;
        font-weight: 200 800;
        font-display: swap;
        src: url('./fonts/manrope-latin-wght-normal.woff2') format('woff2');
      }
      @font-face {
        font-family: 'IBM Plex Mono';
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: url('./fonts/ibm-plex-mono-latin-400-normal.woff2') format('woff2');
      }
      @font-face {
        font-family: 'IBM Plex Mono';
        font-style: normal;
        font-weight: 500;
        font-display: swap;
        src: url('./fonts/ibm-plex-mono-latin-500-normal.woff2') format('woff2');
      }
      @font-face {
        font-family: 'IBM Plex Mono';
        font-style: normal;
        font-weight: 600;
        font-display: swap;
        src: url('./fonts/ibm-plex-mono-latin-600-normal.woff2') format('woff2');
      }
      @font-face {
        font-family: 'IBM Plex Mono';
        font-style: normal;
        font-weight: 700;
        font-display: swap;
        src: url('./fonts/ibm-plex-mono-latin-700-normal.woff2') format('woff2');
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
